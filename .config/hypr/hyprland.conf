# Nightmare's Hyprland config - Joy Division edition :3
# machine-specific overrides (GPU env vars etc.) — not synced to git
source = $HOME/.config/hypr/machine.conf

##############
### MONITORS ###
##############

monitor = HDMI-A-1, 1920x1080, 0x0, 1
monitor = DP-3, 1920x1080, 1920x0, 1
monitor = , preferred, auto, 1

###############
### PROGRAMS ###
###############

$mod    = SUPER
$term   = kitty
$menu   = pgrep wofi >/dev/null 2>&1 && killall wofi || wofi --show drun
$browser       = firefox
$file_explorer = nautilus
$swaylock      = /home/nightmare/.config/sway/swaylock.sh

$left  = A
$right = D
$up    = W
$down  = S

###############
### AUTOSTART ###
###############

exec-once = waybar
exec-once = hyprpaper
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

###############
### ENV VARS ###
###############

env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita
env = QT_QPA_PLATFORM, wayland
env = GDK_BACKEND, wayland
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

#######################
### LOOK AND FEEL ###
#######################

general {
    gaps_in  = 10
    gaps_out = 10
    border_size = 2

    col.active_border   = rgba(4A90D9ff)
    col.inactive_border = rgba(141E2Aff)

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 6

    active_opacity   = 1.0
    inactive_opacity = 0.86

    blur {
        enabled  = true
        size     = 5
        passes   = 2
    }

    shadow {
        enabled        = true
        range          = 24
        render_power   = 3
        color          = rgba(000D1Aaa)
        color_inactive = rgba(00000033)
    }
}

animations {
    enabled = true

    # curves
    bezier = overshot,  0.05, 0.9, 0.1, 1.05
    bezier = smoothIn,  0.25, 1.0, 0.5, 1.0
    bezier = smoothOut, 0.36, 0.0, 0.66, -0.56
    bezier = linear,    0.0,  0.0, 1.0,  1.0

    # windows
    animation = windows,     1, 4, overshot,  slide
    animation = windowsOut,  1, 3, smoothOut, slide
    animation = windowsMove, 1, 3, smoothIn,  slide

    # fades
    animation = fade,    1, 3, smoothIn
    animation = fadeOut, 1, 3, smoothOut

    # workspaces
    animation = workspaces, 1, 4, overshot, slide

    # border glow pulse
    animation = border,      1, 8, default
    animation = borderangle, 1, 8, linear, loop
}

input {
    kb_layout   = cz
    follow_mouse = 1
    sensitivity  = 0
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}

debug {
    disable_logs = false
}

###################
### KEYBINDINGS ###
###################

# basics
bind = $mod,       Return, exec,          $term
bind = $mod,       Q,      killactive
bind = $mod,       SPACE,  exec,          $menu
bind = $mod,       B,      exec,          $browser
bind = $mod,       E,      exec,          $file_explorer
bind = $mod,       F,      fullscreen
bind = $mod,       V,      togglefloating
bind = $mod,       L,      exec,          $swaylock
bind = $mod,       R,      submap,        resize
bind = $mod SHIFT, SPACE,  togglefloating
bind = $mod SHIFT, E,      exit

# screenshot
bind = ALT SHIFT, S, exec, /home/nightmare/.config/sway/screenshot.sh
bind = ,          Print, exec, grim

# reload waybar (hyprland hot-reloads its own config automatically on save)
bind = $mod SHIFT, C, exec, pkill waybar; waybar &

# move focus
bind = $mod, $left,  movefocus, l
bind = $mod, $down,  movefocus, d
bind = $mod, $up,    movefocus, u
bind = $mod, $right, movefocus, r
bind = $mod, left,   movefocus, l
bind = $mod, down,   movefocus, d
bind = $mod, up,     movefocus, u
bind = $mod, right,  movefocus, r

# move windows
bind = $mod SHIFT, $left,  movewindow, l
bind = $mod SHIFT, $down,  movewindow, d
bind = $mod SHIFT, $up,    movewindow, u
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, left,   movewindow, l
bind = $mod SHIFT, down,   movewindow, d
bind = $mod SHIFT, up,     movewindow, u
bind = $mod SHIFT, right,  movewindow, r

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# scratchpad
bind = $mod,       minus, togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace,        special:magic

# resize submap
submap = resize
binde = , $left,  resizeactive, -20  0
binde = , $right, resizeactive,  20  0
binde = , $up,    resizeactive,  0  -20
binde = , $down,  resizeactive,  0   20
binde = , left,   resizeactive, -20  0
binde = , right,  resizeactive,  20  0
binde = , up,     resizeactive,  0  -20
binde = , down,   resizeactive,  0   20
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# mouse window drag/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# audio
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
